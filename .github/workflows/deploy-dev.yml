name: Deploy Dev

on:
  push:
    branches: [dev]

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  DEPLOY_DIR: /opt/fpc/dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-write-only: true

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=dev-${{ env.SHORT_SHA }}
            type=raw,value=dev-latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SCP docker-compose.dev.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.dev.yml
          target: ${{ env.DEPLOY_DIR }}/

      - name: SSH deploy and healthcheck
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/fpc/dev

            echo "=== Pulling image dev-${{ env.SHORT_SHA }} ==="

            IMAGE_TAG="dev-${{ env.SHORT_SHA }}" \
              docker compose -f docker-compose.dev.yml pull

            IMAGE_TAG="dev-${{ env.SHORT_SHA }}" \
              docker compose -f docker-compose.dev.yml up -d --force-recreate

            echo "dev-${{ env.SHORT_SHA }}" > .last-tag

            echo "=== Healthcheck ==="
            for i in $(seq 1 12); do
              if wget --spider -q http://localhost:8081/actuator/health; then
                echo "Healthcheck passed after $((i * 10))s"
                exit 0
              fi
              echo "Attempt $i/12 failed, waiting 10s..."
              sleep 10
            done
            echo "ERROR: Healthcheck failed after 120s" >&2
            exit 1
