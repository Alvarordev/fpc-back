name: Deploy Prod

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  DEPLOY_DIR: /opt/fpc/prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle with caching
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-write-only: true

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::8}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=prod-${{ env.SHORT_SHA }}
            type=raw,value=prod-latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SCP docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: ${{ env.DEPLOY_DIR }}/

      - name: SSH deploy with rollback
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/fpc/prod

            echo "=== Pulling image prod-${{ env.SHORT_SHA }} ==="

            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Save currently running tag for potential rollback
            PREV_TAG=""
            if [ -f .last-tag ]; then
              PREV_TAG=$(cat .last-tag)
              echo "Previous tag: $PREV_TAG"
            fi

            IMAGE_TAG="prod-${{ env.SHORT_SHA }}" \
              docker compose -f docker-compose.prod.yml pull

            IMAGE_TAG="prod-${{ env.SHORT_SHA }}" \
              docker compose -f docker-compose.prod.yml up -d --force-recreate

            echo "=== Healthcheck ==="
            HEALTHCHECK_OK=false
            for i in $(seq 1 15); do
              if wget --spider -q http://localhost:8080/actuator/health; then
                echo "Healthcheck passed after $((i * 10))s"
                HEALTHCHECK_OK=true
                break
              fi
              echo "Attempt $i/15 failed, waiting 10s..."
              sleep 10
            done

            if [ "$HEALTHCHECK_OK" = true ]; then
              echo "prod-${{ env.SHORT_SHA }}" > .last-tag
              exit 0
            fi

            # ── Rollback ──────────────────────────────────────────
            echo "ERROR: Healthcheck failed after 150s — rolling back" >&2
            if [ -n "$PREV_TAG" ]; then
              echo "Rolling back to $PREV_TAG"
              IMAGE_TAG="$PREV_TAG" \
                docker compose -f docker-compose.prod.yml up -d --force-recreate

              echo "=== Post-rollback healthcheck ==="
              for i in $(seq 1 10); do
                if wget --spider -q http://localhost:8080/actuator/health; then
                  echo "Rollback healthcheck passed after $((i * 10))s"
                  exit 1
                fi
                sleep 10
              done
              echo "CRITICAL: Rollback healthcheck also failed" >&2
            else
              echo "No previous tag found — manual intervention required" >&2
            fi
            exit 1
