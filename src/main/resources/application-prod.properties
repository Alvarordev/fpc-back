# Production profile - overrides base application.properties
# Activated via: SPRING_PROFILES_ACTIVE=prod

# Database - production database
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/fpc_db}

# Logging - minimal for production
logging.level.root=INFO

# Actuator - restrict to health only in prod for security
management.endpoints.web.exposure.include=health,info
