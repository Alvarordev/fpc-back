spring.application.name=fpc-back

# Database Configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fpc_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
# Required: Base64-encoded secret with at least 32 random bytes.
# Example generation: openssl rand -base64 32
# No legacy/fallback secret path is supported.
jwt.secret-base64=${JWT_SECRET:4uEXirETE5BZ+3RqiXhvCgvK7TR42OwYo7MJ/Qsf8iA=}
jwt.access-expiration=${JWT_ACCESS_EXPIRATION:900000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# CORS
# Comma-separated origin patterns. Useful for Vercel previews with https://*.vercel.app
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,https://*.vercel.app}
app.cors.allowed-methods=${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
app.cors.allowed-headers=${APP_CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin}
app.cors.exposed-headers=${APP_CORS_EXPOSED_HEADERS:}
app.cors.allow-credentials=${APP_CORS_ALLOW_CREDENTIALS:false}
app.cors.max-age-seconds=${APP_CORS_MAX_AGE_SECONDS:3600}

# Gemini AI API Key
gemini.api.key=${GEMINI_API_KEY:}
