spring.application.name=fpc-back

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/fpc_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# Flyway
spring.flyway.enabled=true

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
# Required: Base64-encoded secret with at least 32 random bytes.
# Example generation: openssl rand -base64 32
# No legacy/fallback secret path is supported.
jwt.secret-base64=4uEXirETE5BZ+3RqiXhvCgvK7TR42OwYo7MJ/Qsf8iA=
jwt.access-expiration=900000
jwt.refresh-expiration=604800000
