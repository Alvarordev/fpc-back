# Dev profile - overrides base application.properties
# Activated via: SPRING_PROFILES_ACTIVE=dev

# Database - separate dev database on same PostgreSQL instance
spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/fpc_db_dev}

# Logging - verbose for development
logging.level.com.hazardev=DEBUG
logging.level.org.springframework=INFO

# Actuator - expose all endpoints in dev for debugging
management.endpoints.web.exposure.include=*
